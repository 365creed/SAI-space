<!DOCTYPE html>

<head>

<body>
<header class="header">
  <div class="container">
    <h1 class="logo"><a href="index.html">SAI Space</a></h1>

      <a href="reservation.html">예약</a>
      <a href="about.html">위치</a>
    </nav>

<section class="page-hero">
  <h2>관리자 로그인</h2>
  <p>운영/회원가입 관리는 관리자 계정으로만 가능합니다.</p>
</section>

<section class="container" style="max-width:520px;">
  <div class="card card-body" style="margin-top:20px;">
    <input type="text" id="adminId" placeholder="관리자 아이디">
    <input type="password" id="adminPass" placeholder="관리자 비밀번호" style="margin-top:10px;">
    <button class="btn" style="margin-top:12px;" onclick="login()">접속</button>
    <p style="font-size:13px; color:#666; margin-top:10px;">최초 1회는 입력한 정보로 관리자 계정이 설정됩니다. 이후에는 동일 정보로 로그인하세요.</p>
  </div>

<script src="js/login.js"></script>
