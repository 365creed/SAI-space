<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAI Space | 예약</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/reservation.css">

</head>

<body>

<header class="header">

<div class="container">

<h1 class="logo">
<a href="index.html">SAI Space</a>
</h1>

<nav class="nav">
<a href="index.html">홈</a>
<a href="space.html">공간</a>
<a href="program.html">프로그램</a>
<a href="reservation.html">예약</a>
<a href="about.html">위치</a>
</nav>

</div>

</header>

<input type="text" id="memberId" placeholder="회원번호 입력">
<button type="button" onclick="checkMember()">예약 진행</button>


<section class="page-hero">
<h2>공간 예약</h2>
</section>


<section class="container">

<form id="reservationForm">

<input type="text" name="name" placeholder="이름" required>

<input type="tel" name="phone" placeholder="연락처" required>


<select name="space">

<option value="3F_BIG_LECTURE">3층 큰강의실</option>
<option value="2F_SMALL_LECTURE">2층 소강의실</option>
<option value="2F_SMALL_ROOM_1">2층 작은방 1</option>
<option value="2F_SMALL_ROOM_2">2층 작은방 2</option>
<option value="2F_SMALL_ROOM_3">2층 작은방 3</option>

</select>


<input type="date" name="date" required>


<!-- 시간 슬롯 -->
<div id="timeSlots" class="time-slots"></div>

<!-- 선택된 시간 저장 -->
<input type="hidden" name="time" required>


<button type="submit">
예약 요청
</button>

</form>

</section>


<footer class="footer">
<p>© SAI Space</p>
</footer>


<script src="js/calendar.js"></script>
<script src="js/reservation.js"></script>

</body>
</html>
